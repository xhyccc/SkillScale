# SkillScale — Redpanda (Kafka) Deployment
# Generated by build_with_redpanda.sh — DO NOT EDIT MANUALLY
#
services:
  # ── Redpanda Broker ──
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.6
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "8081:8081"
      - "8082:8082"
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redpanda Console (Web UI) ──
  console:
    image: docker.redpanda.com/redpandadata/console:v2.4.3
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yaml && /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yaml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:29092"]
          schemaRegistry:
            enabled: false
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "8080:8080"
    depends_on:
      - redpanda


  # Skill Server: code-analysis
  skill-server-code-analysis:
    build:
      context: .
      dockerfile: docker/Dockerfile.redpanda
    command: ["python3", "skillscale/server_kafka.py", "--topic", "TOPIC_CODE_ANALYSIS", "--skills-dir", "/skills"]
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ./skills/code-analysis:/skills/code-analysis
      - ./skillscale:/app/skillscale
    environment:
      SKILLSCALE_BROKER_URL: redpanda:29092
      SKILLSCALE_SKILLS_DIR: /skills
      SKILLSCALE_TIMEOUT: "300000"
      LLM_PROVIDER: "openai"
      OPENAI_API_KEY: "sk-kozafasriejhrdpdjcautgzvqdiobnhjotqmtanfnbodrzec"
      OPENAI_API_BASE: "https://api.siliconflow.cn/v1"
      OPENAI_MODEL: "Pro/deepseek-ai/DeepSeek-V3.1-Terminus"
      SKILLSCALE_TOPIC: "TOPIC_CODE_ANALYSIS"

  # Skill Server: data-processing
  skill-server-data-processing:
    build:
      context: .
      dockerfile: docker/Dockerfile.redpanda
    command: ["python3", "skillscale/server_kafka.py", "--topic", "TOPIC_DATA_PROCESSING", "--skills-dir", "/skills"]
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ./skills/data-processing:/skills/data-processing
      - ./skillscale:/app/skillscale
    environment:
      SKILLSCALE_BROKER_URL: redpanda:29092
      SKILLSCALE_SKILLS_DIR: /skills
      SKILLSCALE_TIMEOUT: "300000"
      LLM_PROVIDER: "openai"
      OPENAI_API_KEY: "sk-kozafasriejhrdpdjcautgzvqdiobnhjotqmtanfnbodrzec"
      OPENAI_API_BASE: "https://api.siliconflow.cn/v1"
      OPENAI_MODEL: "Pro/deepseek-ai/DeepSeek-V3.1-Terminus"
      SKILLSCALE_TOPIC: "TOPIC_DATA_PROCESSING"

  # ── Agent (Data Generator / CLI) ──
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.redpanda
    command: ["python3", "agent/main_kafka.py"]
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      SKILLSCALE_BROKER_URL: redpanda:29092
      SKILLSCALE_SKILLS_DIR: /skills
      SKILLSCALE_TIMEOUT: "300000"
      LLM_PROVIDER: "openai"
      OPENAI_API_KEY: "sk-kozafasriejhrdpdjcautgzvqdiobnhjotqmtanfnbodrzec"
      OPENAI_API_BASE: "https://api.siliconflow.cn/v1"
      OPENAI_MODEL: "Pro/deepseek-ai/DeepSeek-V3.1-Terminus"
    stdin_open: true
    tty: true

volumes:
  redpanda-data:
